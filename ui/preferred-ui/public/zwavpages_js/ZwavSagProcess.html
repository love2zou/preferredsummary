<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暂降过程（HTML+JS）</title>
  <link href="./assets/app.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>

<body>
  <div class="viewer-container">
    <div class="viewer-header">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
        <div class="viewer-title">
          <div class="viewer-title-line">
            <h2>暂降分析过程</h2>
            <span class="file-name" id="fileName">-</span>
            <span class="sub-title" id="headerSub">-</span>
          </div>
        </div>
        <div style="display:flex; gap:10px;">
          <a class="el-button" href="./ZwavSagEvents.html">返回列表</a>
          <button class="el-button" id="btnOpenApiConfig">接口配置</button>
          <button class="el-button" id="btnFetch">刷新</button>
          <button class="el-button" id="btnWaveSetting">波形设置</button>
          <button class="el-button el-button--primary" id="btnPreview">预览计算</button>
        </div>
      </div>
    </div>

    <div class="viewer-content">
      <div class="left-panel">
        <div class="main-body">
          <div class="channel-sidebar">
            <div class="sidebar-header">
              <input id="channelSearch" class="el-input" placeholder="通道名称/编号" style="width:100%" />
            </div>
            <div class="sidebar-body">
              <div class="channel-group">
                <div class="section-title">电压通道</div>
                <div class="sidebar-group-header">
                  <label class="check-all">
                    <input id="analogCheckAll" type="checkbox" />
                    <span>全选</span>
                  </label>
                  <span class="count">已选<span id="analogCount">0</span>个</span>
                </div>
                <div id="analogList" class="channel-list"></div>
              </div>
            </div>
          </div>

          <div class="chart-wrapper">
            <div class="sag-top-row">
              <div id="rawWrap" class="sag-raw-card">
                <div class="sag-card-header">
                  <div>
                    <div class="sag-card-title-line">
                      <div class="sag-card-title">原始波形</div>
                      <div class="sag-card-sub" id="rawSub">-</div>
                    </div>
                  </div>
                  <div style="display:flex; gap:8px; align-items:center;">
                    <button class="icon-btn" id="btnExportRms" title="导出均方根值">
                      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor" d="M5 20h14v-2H5v2zm7-18l-5 5h3v6h4V7h3l-5-5z" />
                      </svg>
                    </button>
                    <button class="icon-btn" id="btnEventDetail" title="事件详情">
                      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor"
                          d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 16H4V6h5.17l2 2H20v14z" />
                      </svg>
                    </button>
                    <button class="icon-btn" id="btnFullScreen" title="窗口全屏">
                      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor"
                          d="M7 14H5v5h5v-2H7v-3zm0-4h2V7h3V5H5v5zm10 9h-3v2h5v-5h-2v3zm0-14V5h-5v2h3v3h2V5z" />
                      </svg>
                    </button>
                  </div>
                </div>
                <div class="raw-legend-all" id="rawLegend"></div>
                <div class="chart-scroll-container">
                  <div id="rawChart" class="raw-chart-content"></div>
                </div>
              </div>

              <div class="sag-report-card" id="reportCard">
                <div class="sag-card-header">
                  <div>
                    <div class="sag-card-title">分析报告</div>
                    <div class="sag-card-sub">基于暂降事件与RMS曲线</div>
                  </div>
                  <div style="display:flex; gap:8px; align-items:center;">
                    <button class="el-button is-link" id="btnCopyReport">复制</button>
                  </div>
                </div>
                <div id="reportBody" class="report-body"></div>
              </div>
            </div>

            <div class="sag-bottom-row">
              <div class="sag-list-card">
                <div class="sag-card-header">
                  <div>
                    <div class="sag-card-title-line">
                      <div class="sag-card-title">电压暂降清单</div>
                      <div class="sag-card-sub" id="sagCountText">共 0 条</div>
                    </div>
                  </div>
                </div>
                <div class="list-table-wrap">
                  <table class="el-table">
                    <thead>
                      <tr>
                        <th class="cell-center" style="width:42px"><input id="sagCheckAll" type="checkbox" /></th>
                        <th class="cell-center" style="width:60px">序号</th>
                        <th class="cell-center" style="width:70px">相别</th>
                        <th class="cell-center" style="width:110px">事件类型</th>
                        <th style="width:180px">发生时间</th>
                        <th style="width:120px">持续时间(ms)</th>
                        <th style="width:120px">暂降幅值(%)</th>
                        <th style="width:120px">残余电压(%)</th>
                      </tr>
                    </thead>
                    <tbody id="sagTbody"></tbody>
                  </table>
                </div>
              </div>

              <div class="sag-tolerance-card">
                <div class="sag-card-header">
                  <div>
                    <div class="sag-card-title-line">
                      <div class="sag-card-title">容忍度曲线</div>
                      <div class="sag-card-sub">清单勾选后打点</div>
                    </div>
                  </div>
                </div>
                <div id="toleranceLegend" class="tolerance-legend"></div>
                <div id="toleranceChart" style="height: 245px; width: 100%;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="el-dialog-mask" id="apiModal">
    <div class="el-dialog">
      <div class="el-dialog__header">
        <div class="el-dialog__title">接口配置</div>
        <button class="el-dialog__close" data-dialog-close>×</button>
      </div>
      <div class="el-dialog__body">
        <div class="search-item" style="width:100%">
          <label>API Base URL</label>
          <input id="apiBaseInput" class="el-input" placeholder="例如：http://159.75.184.108:8080" style="width:100%" />
        </div>
        <div style="margin-top:8px; font-size:12px; color: var(--el-text-color-secondary);">
          默认优先读取 ?apiBase=... 其次读取 localStorage.zwav_api_base。
        </div>
      </div>
      <div class="el-dialog__footer">
        <button class="el-button" data-dialog-close>关闭</button>
        <button class="el-button el-button--primary" id="btnSaveApiBase">保存</button>
      </div>
    </div>
  </div>

  <div class="el-dialog-mask" id="waveModal">
    <div class="el-dialog el-dialog--lg">
      <div class="el-dialog__header">
        <div class="el-dialog__title">波形设置</div>
        <button class="el-dialog__close" data-dialog-close>×</button>
      </div>
      <div class="el-dialog__body">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
          <div class="search-item" style="width:100%">
            <label>参考电压(V)</label>
            <input id="referenceVoltage" type="number" step="0.01" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>最小持续(ms)</label>
            <input id="minDurationMs" type="number" step="1" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>暂降阈值(%)</label>
            <input id="sagThresholdPct" type="number" step="1" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>中断阈值(%)</label>
            <input id="interruptThresholdPct" type="number" step="1" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>迟滞(%)</label>
            <input id="hysteresisPct" type="number" step="0.5" class="el-input" />
          </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="search-item" style="width:100%">
            <label>From Sample</label>
            <input id="fromSample" type="number" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>To Sample</label>
            <input id="toSample" type="number" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>Limit</label>
            <input id="limit" type="number" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>DownSample</label>
            <input id="downSample" type="number" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>RMS窗口(周波)</label>
            <input id="rmsWindowCycles" type="number" step="0.5" class="el-input" />
          </div>
          <div class="search-item" style="width:100%">
            <label>RMS更新(周波)</label>
            <input id="rmsHopCycles" type="number" step="0.25" class="el-input" />
          </div>
        </div>
      </div>
      <div class="el-dialog__footer">
        <button class="el-button" data-dialog-close>关闭</button>
        <button class="el-button el-button--primary" id="btnApplyWave">应用</button>
      </div>
    </div>
  </div>

  <div class="el-dialog-mask" id="eventModal">
    <div class="el-dialog el-dialog--xl">
      <div class="el-dialog__header">
        <div class="el-dialog__title">事件详情</div>
        <button class="el-dialog__close" data-dialog-close>×</button>
      </div>
      <div class="el-dialog__body">
        <div id="eventDetailBody"></div>
      </div>
      <div class="el-dialog__footer">
        <button class="el-button" data-dialog-close>关闭</button>
      </div>
    </div>
  </div>

  <div class="el-dialog-mask" id="exportConfirmModal">
    <div class="el-dialog">
      <div class="el-dialog__header">
        <div class="el-dialog__title">确认导出</div>
        <button class="el-dialog__close" data-dialog-close>×</button>
      </div>
      <div class="el-dialog__body">
        <div style="color: var(--el-text-color-primary); line-height: 20px;">确定导出均方根值（RMS）数据吗？</div>
      </div>
      <div class="el-dialog__footer">
        <button class="el-button" data-dialog-close>取消</button>
        <button class="el-button el-button--primary" id="btnConfirmExportRms">确定</button>
      </div>
    </div>
  </div>

  <style>
    .viewer-title-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .viewer-title-line h2 {
      margin: 0;
    }

    .file-name {
      font-size: 12px;
      color: var(--el-text-color-primary);
      font-weight: 600;
    }

    .sag-card-title-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .sag-card-title-line .sag-card-sub {
      margin-top: 0;
    }

    .sag-top-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .sag-raw-card {
      flex: 1;
      min-width: 0;
      background: #fff;
      border: 1px solid var(--el-border-color);
      border-radius: 6px;
      padding: 12px;
    }

    .sag-raw-card.is-window-fullscreen {
      position: fixed;
      inset: 10px;
      z-index: 3000;
      background: #fff;
      border-radius: 6px;
    }

    .sag-report-card {
      flex: 0 0 360px;
      max-width: 360px;
      min-width: 280px;
      background: #fff;
      border: 1px solid var(--el-border-color);
      border-radius: 6px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .report-body {
      margin-top: 8px;
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .report-line {
      font-size: 12px;
      color: var(--el-text-color-primary);
      line-height: 18px;
      margin-bottom: 8px;
    }

    .sag-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0 8px 0;
    }

    .sag-card-title {
      font-weight: 700;
      color: var(--el-text-color-primary);
    }

    .sag-card-sub {
      font-size: 12px;
      color: var(--el-text-color-secondary);
      margin-top: 2px;
    }

    .raw-legend-all {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      margin-bottom: 8px;
    }

    .chart-scroll-container {
      height: 480px;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .raw-chart-content {
      width: 100%;
      min-height: 420px;
      box-sizing: border-box;
    }

    .marker-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--el-text-color-secondary);
    }

    .marker-footer-text {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend-line {
      width: 18px;
      height: 3px;
      border-radius: 2px;
      display: inline-block;
      vertical-align: middle;
    }

    .legend-line.rms {
      height: 2px;
    }

    .legend-dash {
      width: 18px;
      height: 0;
      border-bottom-width: 2px;
      border-bottom-style: dashed;
      display: inline-block;
      vertical-align: middle;
    }

    .dash-sag {
      border-bottom-color: #1677ff;
    }

    .dash-recover {
      border-bottom-color: #52c41a;
    }

    .dash-interrupt {
      border-bottom-color: #fa8c16;
    }

    .legend-area {
      width: 18px;
      height: 10px;
      background: #fff1f1;
      border: 1px solid rgba(245, 108, 108, 0.35);
      border-radius: 2px;
      display: inline-block;
      vertical-align: middle;
    }

    .legend-vline {
      width: 0;
      height: 12px;
      border-left: 2px dashed rgba(0, 0, 0, 0.35);
      display: inline-block;
      vertical-align: middle;
    }

    .legend-text {
      font-size: 12px;
      color: var(--el-text-color-secondary);
      margin-left: 6px;
      vertical-align: middle;
    }

    .sag-bottom-row {
      display: flex;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
      flex: 1;
      margin-top: 10px;
    }

    .sag-list-card,
    .sag-tolerance-card {
      flex: 1;
      border: 1px solid var(--el-border-color);
      border-radius: 6px;
      background: #fff;
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sag-tolerance-card {
      overflow: hidden;
    }

    .list-table-wrap {
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .tolerance-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      margin-bottom: 8px;
      position: relative;
      z-index: 2;
    }

    #toleranceChart {
      max-width: 100%;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
    }

    .legend-item.is-hidden {
      opacity: 0.45;
    }

    .legend-item[data-curve] {
      cursor: pointer;
      user-select: none;
    }

    .legend-line-demo {
      width: 18px;
      height: 0;
      border-bottom-width: 2px;
      border-bottom-style: solid;
      display: inline-block;
      vertical-align: middle;
    }

    .legend-line-demo.legacy {
      border-bottom-color: #000000;
    }

    .legend-line-demo.current {
      border-bottom-color: #1677ff;
    }
  </style>

  <script type="module" src="./assets/zwav-sag-process.js"></script>
</body>

</html>
