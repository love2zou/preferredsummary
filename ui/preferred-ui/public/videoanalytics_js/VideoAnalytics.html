<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频智能分析任务</title>
  <link href="./assets/video-analytics.css" rel="stylesheet" />
</head>

<body>
  <div id="toastRoot" class="toast-root"></div>

  <div class="va-container">
    <div class="list-view">
      <div class="list-header">
        <h2>视频智能分析任务</h2>
        <div class="list-actions">
          <div class="search-input-wrap">
            <input id="searchJobNo" class="el-input" placeholder="请输入任务编号查询" />
            <button class="el-button search-append" id="btnSearchJob" type="button">查询</button>
          </div>
          <button class="el-button" id="btnResetSearch" type="button">重置</button>
          <button class="el-button el-button--primary" id="btnOpenCreateDialog" type="button">新建持续上传会话</button>
          <button class="el-button" id="btnOpenApiConfig" type="button">接口配置</button>
        </div>
      </div>

      <div class="list-table-wrap">
        <table class="el-table job-table">
          <thead>
            <tr>
              <th style="width: 64px;">#</th>
              <th>任务编号</th>
              <th style="width: 130px;">状态</th>
              <th style="width: 170px;">进度</th>
              <th style="width: 180px;">开始时间</th>
              <th style="width: 110px;">文件数</th>
              <th style="width: 170px;">操作</th>
            </tr>
          </thead>
          <tbody id="jobTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="el-dialog-mask" id="apiDialog">
    <div class="el-dialog">
      <div class="el-dialog__header">
        <div class="el-dialog__title">接口配置</div>
        <button class="el-dialog__close" data-dialog-close="apiDialog" type="button">×</button>
      </div>
      <div class="el-dialog__body">
        <label class="dialog-field">
          <span>API Base URL</span>
          <input id="apiBaseInput" class="el-input" placeholder="例如：http://159.75.184.108:8080" />
        </label>
        <div class="dialog-tip">优先读取 URL 中的 <code>?apiBase=...</code>，其次读取 <code>localStorage</code>。本静态页默认直连后端接口。</div>
      </div>
      <div class="el-dialog__footer">
        <button class="el-button" data-dialog-close="apiDialog" type="button">关闭</button>
        <button class="el-button el-button--primary" id="btnSaveApiBase" type="button">保存</button>
      </div>
    </div>
  </div>

  <div class="el-dialog-mask" id="createDialog">
    <div class="el-dialog el-dialog--lg">
      <div class="el-dialog__header">
        <div class="el-dialog__title">新建持续上传会话</div>
        <button class="el-dialog__close" data-dialog-close="createDialog" type="button">×</button>
      </div>
      <div class="el-dialog__body">
        <div class="el-alert el-alert--info">
          <div class="tip-text">
            该会话支持 <strong>持续上传</strong>：你可以不断上传视频，服务端收到视频后立即入队分析；
            当你确认不再上传时，在工作台点击 <strong>关闭上传</strong> 即可完成收尾。
          </div>
          <div class="tip-sub">
            本页创建会话<strong>不上送算法参数</strong>，后端将使用默认参数。
            如需调整“重新分析”的入队参数，可在工作台的 <strong>参数设置</strong> 中临时修改。
          </div>
        </div>
      </div>
      <div class="el-dialog__footer">
        <button class="el-button" data-dialog-close="createDialog" type="button">取消</button>
        <button class="el-button el-button--primary" id="btnCreateJob" type="button">创建并进入工作台</button>
      </div>
    </div>
  </div>

  <script type="module" src="./assets/video-analytics-list.js"></script>
</body>

</html>
